<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shiah's Freshman Math Reset</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6F0;
    --bg-card:#FFFFFF;
    --bg-card-2:#F8F1F4;
    --ink:#4A3F52;
    --muted:#948A9C;
    --blue:#7FA6D9; --blue-soft:#E8F0FA;
    --lilac:#B497D6; --lilac-soft:#F1E9F8;
    --pink:#E8A9C4; --pink-soft:#FBEAF1;
    --sage:#84A87F; --sage-soft:#EAF2E7;
    --success:#6FAE7A; --success-soft:#E7F3E7;
    --danger:#D9807E; --danger-soft:#FBEAE8;
    --ring-track:#EEE3EA;
    --line:#EEE3E9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image: var(--floral-wallpaper);
    background-repeat:repeat;
    background-size:230px 230px;
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    padding:0 0 60px 0;
  }
  .floral-rule{
    height:16px; margin:10px 0 4px; background-image:var(--floral-divider);
    background-repeat:repeat-x; background-position:left center; background-size:44px 16px;
    opacity:.85;
  }
  .flower-bullet{
    display:inline-block; width:13px; height:13px; background-repeat:no-repeat; background-size:contain;
    flex-shrink:0; vertical-align:middle;
  }
  h1,h2,h3,.display{ font-family:'Fraunces',serif; font-weight:600; }
  .mono{ font-family:'Space Mono',monospace; }
  .wrap{ max-width:920px; margin:0 auto; padding:20px 18px 0; position:relative;}

  /* HERO */
  .hero{
    display:flex; align-items:center; gap:22px; flex-wrap:wrap;
    background:linear-gradient(135deg, #FFFFFF 0%, #FBF3F7 60%, #F7EEF5 100%);
    border:1px solid var(--line);
    border-radius:26px; padding:26px; margin-top:12px;
    position:relative; overflow:hidden;
    box-shadow:0 10px 30px -18px rgba(120,90,120,0.25);
  }
  .hero-deco{ position:absolute; top:0; right:0; width:230px; height:190px; pointer-events:none; opacity:.95;}
  .hero::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:15px;
    background-image:var(--floral-divider); background-repeat:repeat-x; background-position:left center;
    background-size:44px 15px; opacity:.7; pointer-events:none;
  }
  .hero-text{ flex:1; min-width:220px; z-index:1;}
  .eyebrow{
    font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
    font-weight:800; margin-bottom:6px;
  }
  .hero h1{ font-size:29px; margin:0 0 8px; line-height:1.2; color:#3E3446;}
  .hero p{ color:#6E6377; margin:0; font-size:15px; line-height:1.55; max-width:440px;}
  .streak-pill{
    display:inline-flex; align-items:center; gap:6px; margin-top:14px;
    background:var(--pink-soft); color:#8A5570; padding:7px 14px; border-radius:100px; font-size:13px; font-weight:800;
  }

  /* BLOOM RING */
  .wheel-box{ position:relative; width:150px; height:150px; flex-shrink:0; z-index:1;}
  .wheel-center{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .wheel-center .bloom{ font-size:26px; line-height:1; }
  .wheel-center .num{ font-size:19px; font-weight:800; font-family:'Space Mono',monospace; margin-top:2px;}
  .wheel-center .lbl{ font-size:9.5px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; text-align:center;}

  /* NAV CHIPS */
  .nav-row{ display:flex; gap:8px; overflow-x:auto; padding:18px 2px 6px; scrollbar-width:thin; }
  .chip{
    flex-shrink:0; padding:9px 16px; border-radius:100px; background:#fff; color:var(--muted);
    font-weight:800; font-size:13px; cursor:pointer; border:2px solid var(--line); transition:.15s;
    white-space:nowrap; display:flex; align-items:center; gap:6px;
  }
  .chip:hover{ background:var(--pink-soft); }
  .chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip .check{ color:var(--success); font-size:12px; }

  /* CARD */
  .card{
    background-color:var(--bg-card);
    background-image: var(--floral-corner);
    background-repeat:no-repeat;
    background-position: right -14px top -12px;
    background-size:128px 108px;
    border-radius:20px; padding:26px 22px 22px; margin-top:14px;
    border:1px solid var(--line);
    position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:12px;
    background-image:var(--floral-divider); background-repeat:repeat-x; background-position:left center;
    background-size:40px 12px; opacity:.8;
  }
  .card h2{ font-size:20px; margin:0 0 4px; color:#3E3446;}
  .day-tag{
    display:inline-block; font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
    padding:4px 10px; border-radius:8px; margin-bottom:10px;
  }
  .section-label{
    font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    margin:20px 0 10px; display:flex; align-items:center; gap:8px;
  }
  ul.lesson-list{ margin:6px 0 0; padding-left:20px; }
  ul.lesson-list li{ margin-bottom:6px; line-height:1.5; font-size:15px;}
  .goal-box{
    background:var(--sage-soft); border-left:3px solid var(--sage); border-radius:8px; padding:12px 14px; margin-top:10px;
    font-size:14px; color:#4E5E48; position:relative; padding-right:36px;
  }
  .goal-box::after{
    content:""; position:absolute; right:8px; top:50%; transform:translateY(-50%); width:22px; height:22px;
    background-image:var(--floral-icon-sage); background-repeat:no-repeat; background-size:contain; opacity:.55;
  }
  .goal-box b{ color:#33422F; }

  /* VIDEO BUTTONS */
  .video-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .video-btn{
    display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--ink);
    background:var(--bg-card-2); padding:10px 14px; border-radius:12px; font-size:13px; font-weight:700;
    border:1px solid var(--line); transition:.15s;
  }
  .video-btn:hover{ background:var(--pink-soft); transform:translateY(-1px); }
  .video-btn .play{
    width:22px; height:22px; border-radius:50%; background:var(--pink); display:flex; align-items:center;
    justify-content:center; font-size:10px; flex-shrink:0; color:#fff;
  }

  /* FLASHCARD ENGINE */
  .flash-panel{ background:var(--bg-card-2); border-radius:18px; padding:18px; }
  .flash-meta{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
  .flash-meta .lvl{ font-size:12px; font-weight:800; color:var(--muted); }
  .attempt-dots{ display:flex; gap:5px; }
  .attempt-dot{ width:9px; height:9px; border-radius:50%; background:var(--line); }
  .attempt-dot.used{ background:var(--danger); }
  .flash-front{
    text-align:center; font-size:24px; font-weight:700; font-family:'Space Mono',monospace;
    background:#fff; border-radius:14px; padding:22px 14px; border:1px solid var(--line); margin-bottom:14px;
  }
  .flash-front small{ display:block; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; color:var(--muted); margin-top:8px;}
  .flash-input-row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .flash-input{
    width:150px; text-align:center; font-size:19px; padding:10px; border-radius:10px; border:2px solid var(--line);
    background:#fff; color:var(--ink); font-family:'Space Mono',monospace; font-weight:700;
  }
  .flash-input:focus{ outline:none; border-color:var(--lilac); }
  .hint-box{
    margin-top:12px; background:var(--lilac-soft); border-left:3px solid var(--lilac); border-radius:8px;
    padding:10px 12px; font-size:13.5px; color:#5A4770; line-height:1.5;
  }
  .success-box{
    margin-top:12px; background:var(--success-soft); border-left:3px solid var(--success); border-radius:8px;
    padding:12px 14px; font-size:14px; color:#2E5C36; font-weight:700;
  }
  .explain-box{
    margin-top:12px; background:var(--blue-soft); border-left:3px solid var(--blue); border-radius:10px;
    padding:14px; font-size:14px; color:#2E4E70; line-height:1.6;
  }
  .explain-box .ans{ font-size:17px; margin-top:6px; }
  .comp-box{
    margin-top:14px; background:#fff; border:1px dashed var(--lilac); border-radius:12px; padding:14px;
  }
  .comp-box .tag{ font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--lilac); margin-bottom:8px; display:block;}

  /* QUIZ */
  .q-block{ margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .q-block:last-child{ border-bottom:none; }
  .q-text{ font-weight:800; margin-bottom:10px; font-size:15px; }
  .opt-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .opt-btn{
    background:var(--bg-card-2); border:2px solid transparent; color:var(--ink); padding:9px 14px;
    border-radius:10px; cursor:pointer; font-weight:700; font-family:'Space Mono',monospace; font-size:14px;
    transition:.15s;
  }
  .opt-btn:hover{ border-color:var(--lilac); }
  .opt-btn.correct{ background:var(--success); color:#fff; }
  .opt-btn.wrong{ background:var(--danger); color:#fff; }
  .opt-btn.disabled{ pointer-events:none; opacity:.6; }
  .quiz-score{
    text-align:center; padding:14px; border-radius:14px; margin-top:6px; font-weight:800; font-size:15px;
  }

  /* TIMER DRILL */
  .timer-bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .timer-display{ font-size:34px; font-weight:800; font-family:'Space Mono',monospace; }
  .btn{
    background:var(--lilac); color:#fff; border:none; padding:11px 20px; border-radius:12px; font-weight:800;
    cursor:pointer; font-size:14px; transition:.15s;
  }
  .btn:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .btn.secondary{ background:var(--bg-card-2); color:var(--ink); border:1px solid var(--line); }
  .btn.success-btn{ background:var(--success); color:#fff; }
  .drill-q{ font-size:30px; font-weight:800; text-align:center; margin:16px 0; font-family:'Space Mono',monospace; }
  .drill-input{
    width:100%; max-width:160px; display:block; margin:0 auto; text-align:center; font-size:22px;
    padding:10px; border-radius:10px; border:2px solid var(--line); background:#fff; color:var(--ink);
    font-family:'Space Mono',monospace; font-weight:700;
  }
  .drill-feedback{ text-align:center; font-weight:800; margin-top:10px; min-height:22px; }

  .complete-row{ display:flex; align-items:center; justify-content:space-between; margin-top:22px; gap:10px; flex-wrap:wrap;}
  .complete-btn{
    background:var(--success); color:#fff; border:none; padding:12px 20px; border-radius:12px;
    font-weight:800; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:8px;
  }
  .complete-btn.done{ background:#EDEAF0; color:var(--muted); }
  .day-nav-btns{ display:flex; gap:8px; }

  /* DASHBOARD */
  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-top:14px;}
  .stat-card{ background:var(--bg-card-2); border-radius:14px; padding:14px; }
  .stat-num{ font-size:26px; font-weight:800; font-family:'Space Mono',monospace; }
  .stat-lbl{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-top:2px;}
  .skill-row{ margin-top:14px; }
  .skill-name{ display:flex; justify-content:space-between; font-size:13px; font-weight:800; margin-bottom:6px;}
  .skill-track{ height:10px; border-radius:6px; background:var(--ring-track); overflow:hidden; }
  .skill-fill{ height:100%; border-radius:6px; transition:width .6s ease; }

  .footer-note{ text-align:center; color:var(--muted); font-size:12px; margin-top:30px; padding:0 20px; line-height:1.6;}
  ::-webkit-scrollbar{ height:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--lilac); border-radius:6px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ================= FLORAL SVG HELPERS ================= */

function floret(cx,cy,r,color){
  let petals='';
  for(let i=0;i<4;i++){
    petals += `<ellipse cx="${cx}" cy="${cy-r}" rx="${r*0.5}" ry="${r}" fill="${color}" opacity="0.88" transform="rotate(${i*90} ${cx} ${cy})"/>`;
  }
  petals += `<circle cx="${cx}" cy="${cy}" r="${r*0.26}" fill="#FFFDF8" opacity="0.95"/>`;
  return `<g>${petals}</g>`;
}
function hydrangeaCluster(ox,oy,scale,colors){
  colors = colors || ['#8FB0DD','#BBA3D9','#EDB6CE'];
  const positions = [[0,0],[19,-7],[-17,-8],[11,15],[-13,13],[25,11],[-25,4],[0,-21],[17,-23],[-7,-25],[31,-6],[-31,-2],[7,25]];
  let out='<g>';
  positions.forEach((p,i)=>{
    const c = colors[i%colors.length];
    const r = (7+((i*3)%5))*scale;
    out += floret(ox+p[0]*scale, oy+p[1]*scale, r, c);
  });
  out += '</g>';
  return out;
}
function babyBreath(ox,oy,scale){
  scale = scale||1;
  let out = `<g stroke="#A9BC9F" stroke-width="${1.1*scale}" fill="none" opacity="0.9">
    <path d="M ${ox} ${oy} q 10 -20 5 -45"/>
    <path d="M ${ox+2} ${oy-15} q 12 -6 18 -18"/>
    <path d="M ${ox-1} ${oy-28} q -10 -4 -16 -14"/>
  </g>`;
  const dots = [[ox+3,oy-46],[ox+18,oy-58],[ox-14,oy-40],[ox+8,oy-30],[ox-6,oy-15],[ox+20,oy-33]];
  dots.forEach(d=>{ out += `<circle cx="${d[0]}" cy="${d[1]}" r="${2.6*scale}" fill="#FFFDF8" stroke="#E6E0D2" stroke-width="0.6"/>`; });
  return out;
}
function heroDeco(){
  return `<svg class="hero-deco" viewBox="0 0 230 190" xmlns="http://www.w3.org/2000/svg">
    ${hydrangeaCluster(178,50,1.15)}
    ${babyBreath(150,175,1)}
    ${babyBreath(205,150,0.8)}
  </svg>`;
}

/* ================= FLORAL CSS BACKGROUND ASSETS (wallpaper / corners / trims / icons) ================= */

function svgWrap(w,h,inner){ return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${inner}</svg>`; }

function wallpaperTile(){
  // Assorted hydrangeas + baby's breath scattered sparsely across a repeating tile
  const inner = `
    <g opacity="0.4">${hydrangeaCluster(48,44,0.42,['#8FB0DD','#EDB6CE','#BBA3D9'])}${babyBreath(30,150,0.5)}</g>
    <g opacity="0.32">${hydrangeaCluster(178,150,0.36,['#EDB6CE','#9FC79A','#BBA3D9'])}${babyBreath(195,60,0.46)}</g>
    <g opacity="0.28">${hydrangeaCluster(150,225,0.3,['#8FB0DD','#BBA3D9'])}</g>
  `;
  return svgWrap(230,230, inner);
}
function cornerOrnament(){
  const inner = `${hydrangeaCluster(96,44,0.8,['#EDB6CE','#BBA3D9','#8FB0DD'])}${babyBreath(58,108,0.8)}${babyBreath(120,92,0.6)}`;
  return svgWrap(150,130, inner);
}
function dividerTile(){
  const inner = `
    <g stroke="#A9BC9F" stroke-width="0.9" fill="none" opacity="0.7"><path d="M4 8 q6 -4 10 0 q6 4 12 0"/></g>
    <circle cx="8" cy="8" r="2" fill="#EDB6CE" opacity="0.85"/>
    <circle cx="18" cy="8" r="1.5" fill="#FFFDF8" stroke="#E6E0D2" stroke-width="0.5"/>
    <circle cx="27" cy="8" r="2" fill="#BBA3D9" opacity="0.85"/>
    <circle cx="36" cy="8" r="1.5" fill="#8FB0DD" opacity="0.85"/>
  `;
  return svgWrap(44,16, inner);
}
function miniFlowerIcon(color){ return svgWrap(16,16, floret(8,8,6.4,color||'#E8A9C4')); }

function encodeSvg(s){ return encodeURIComponent(s).replace(/'/g,'%27').replace(/"/g,'%22'); }

function setFloralCSSVars(){
  const root = document.documentElement.style;
  root.setProperty('--floral-wallpaper', `url("data:image/svg+xml,${encodeSvg(wallpaperTile())}")`);
  root.setProperty('--floral-corner', `url("data:image/svg+xml,${encodeSvg(cornerOrnament())}")`);
  root.setProperty('--floral-divider', `url("data:image/svg+xml,${encodeSvg(dividerTile())}")`);
  root.setProperty('--floral-icon-pink', `url("data:image/svg+xml,${encodeSvg(miniFlowerIcon('#E8A9C4'))}")`);
  root.setProperty('--floral-icon-blue', `url("data:image/svg+xml,${encodeSvg(miniFlowerIcon('#7FA6D9'))}")`);
  root.setProperty('--floral-icon-lilac', `url("data:image/svg+xml,${encodeSvg(miniFlowerIcon('#B497D6'))}")`);
  root.setProperty('--floral-icon-sage', `url("data:image/svg+xml,${encodeSvg(miniFlowerIcon('#84A87F'))}")`);
}
setFloralCSSVars();

function subjectIconVar(subject){
  return { mult:'--floral-icon-pink', div:'--floral-icon-blue', frac:'--floral-icon-lilac', alg:'--floral-icon-sage' }[subject] || '--floral-icon-pink';
}
function flowerBullet(subject){
  return `<span class="flower-bullet" style="background-image:var(${subjectIconVar(subject)})"></span>`;
}

/* ================= SUBJECTS ================= */

const SUBJECTS = {
  mult: { name:"Multiplication", solid:"#E8A9C4", soft:"#FBEAF1" },
  div:  { name:"Division", solid:"#7FA6D9", soft:"#E8F0FA" },
  frac: { name:"Fractions %", solid:"#B497D6", soft:"#F1E9F8" },
  alg:  { name:"Algebra", solid:"#84A87F", soft:"#EAF2E7" },
};

function yt(q){ return "https://www.youtube.com/results?search_query=" + encodeURIComponent(q); }
function khan(path){ return "https://www.khanacademy.org/search?page_search_query=" + encodeURIComponent(path); }

/* ================= DAY CONTENT (lessons/videos/quiz unchanged; flashcards now engine-driven) ================= */

const DAYS = [
{ id:1, subject:"mult", title:"Multiplication Foundations",
  lesson:["Master the easy anchors first: ×0, ×1, ×2, ×5, ×10 — these unlock everything else.","×0 = always 0. ×1 = the number itself. ×2 = double it.","×5 trick: multiply by 10, then cut in half.","×10 trick: just add a zero to the end."],
  goal:"Answer these instantly: 5×8, 2×9, 10×7, 5×12",
  videos:[{t:"Khan Academy — Multiplication Facts", u:khan("multiplication facts")},{t:"Math Antics — Multiplication", u:yt("Math Antics Multiplication")}],
  flashKinds:["mult"], flashSeeds:{ mult:[{a:0,b:6},{a:1,b:9},{a:2,b:7},{a:5,b:8},{a:5,b:6},{a:10,b:7},{a:2,b:12},{a:5,b:12},{a:10,b:9},{a:2,b:8}] },
  quiz:[{q:"5 × 8 =", opts:["35","40","45","13"], a:"40"},{q:"2 × 9 =", opts:["18","16","11","20"], a:"18"},{q:"10 × 7 =", opts:["17","70","7","700"], a:"70"},{q:"5 × 12 =", opts:["60","50","65","17"], a:"60"},{q:"0 × 84 =", opts:["84","1","0","8"], a:"0"}]
},
{ id:2, subject:"mult", title:"×3 and ×4 Tables",
  lesson:["×3 trick: double the number, then add one more copy of it (2x + x).","×4 trick: double it twice — that's ×2, then ×2 again.","Say the full fact out loud as you practice: “3 times 7 is 21,” not just “21.”"],
  goal:"3×7, 4×8, 4×12, 3×11 — recall in under 3 seconds.",
  videos:[{t:"Khan Academy — 3 & 4 Times Tables", u:khan("multiply by 3 and 4")},{t:"YouTube — ×4 Doubling Trick", u:yt("times 4 double twice trick")}],
  flashKinds:["mult"], flashSeeds:{ mult:[{a:3,b:6},{a:3,b:7},{a:3,b:9},{a:3,b:11},{a:4,b:4},{a:4,b:6},{a:4,b:8},{a:4,b:9},{a:4,b:12},{a:3,b:8}] },
  quiz:[{q:"3 × 7 =", opts:["21","24","18","10"], a:"21"},{q:"4 × 8 =", opts:["24","28","32","36"], a:"32"},{q:"4 × 12 =", opts:["48","44","46","40"], a:"48"},{q:"3 × 11 =", opts:["33","31","30","36"], a:"33"},{q:"4 × 4 =", opts:["8","12","16","20"], a:"16"}]
},
{ id:3, subject:"mult", title:"×6 and ×8 Tables",
  lesson:["×8 trick: double three times in a row (×2, ×2, ×2).","×6 trick: ×6 = ×5 + one more group of the number.","Notice a pattern: even × even always ends in an even number."],
  goal:"Master: 6×7, 6×8, 8×7, 8×9",

/* ================= FLASHCARD ADAPTIVE ENGINE ================= */

const KIND_LABEL = { mult:"Multiplication", div:"Division", frac:"Fractions → Percent", neg_mul:"Negative × Negative", neg_add:"Negative + Negative", onestep_add:"Algebra: x + n", onestep_sub:"Algebra: x − n", onestep_mul:"Algebra: coef · x", onestep_div:"Algebra: x ÷ coef", percentof:"Percent of a Number" };
const MAX_LEVEL = 4;

function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function fmtSigned(n){ return n<0 ? `(${n})` : `${n}`; }

function genParams(kind, level, seedArr){
  if(level<=1) return pick(seedArr);
  switch(kind){
    case 'mult':
      if(level===2) return {a:randInt(3,9), b:randInt(3,9)};
      if(level===3) return {a:randInt(6,9), b:randInt(11,15)};
      return {a:randInt(11,19), b:randInt(6,9)};
    case 'div': {
      let divisor, quotient;
      if(level===2){ divisor=randInt(3,9); quotient=randInt(3,9); }
      else if(level===3){ divisor=randInt(6,9); quotient=randInt(11,15); }
      else { divisor=randInt(6,9); quotient=randInt(12,20); }
      return {divisor, quotient};
    }
    case 'frac': {
      const pools = {
        2:[{num:1,den:5},{num:2,den:5},{num:3,den:5},{num:4,den:5},{num:1,den:3},{num:2,den:3}],
        3:[{num:1,den:8},{num:3,den:8},{num:5,den:8},{num:7,den:8}],
        4:[{num:5,den:6},{num:1,den:6},{num:7,den:9},{num:2,den:9}]
      };
      return pick(pools[Math.min(level,4)]);
    }
    case 'neg_mul':
      if(level===2) return {a:randInt(2,12)*pick([1,-1]), b:randInt(2,12)*pick([1,-1])};
      return {a:randInt(8,20)*pick([1,-1]), b:randInt(8,20)*pick([1,-1])};
    case 'neg_add':
      if(level===2) return {a:randInt(2,20)*pick([1,-1]), b:randInt(2,20)*pick([1,-1])};
      return {a:randInt(15,40)*pick([1,-1]), b:randInt(15,40)*pick([1,-1])};
    case 'onestep_add': {
      const n = level===2 ? randInt(6,20) : randInt(15,35);
      const x = level>=3 ? randInt(-15,20) : randInt(1,20);
      return {n, total:x+n};
    }
    case 'onestep_sub': {
      const n = level===2 ? randInt(6,20) : randInt(15,35);
      const x = level>=3 ? randInt(-15,20) : randInt(1,20);
      return {n, total:x-n};
    }
    case 'onestep_mul': {
      const coef = level===2 ? randInt(3,9) : randInt(4,12);
      const x = level>=3 ? randInt(-15,15) : randInt(2,15);
      return {coef, total:coef*x};
    }
    case 'onestep_div': {
      const coef = level===2 ? randInt(3,9) : randInt(4,12);
      const x = level>=3 ? randInt(-15,15) : randInt(2,15);
      return {coef, total:x, x_full:x*coef};
    }
    case 'percentof': {
      const pools = { 2:[15,20,35,60,80], 3:[5,45,65,90], 4:[12,35,65,85] };
      const pct = pick(pools[Math.min(level,4)]);
      const N = level===2 ? randInt(20,200) : randInt(20,400);
      return {pct, N};
    }
  }
}

function buildCard(kind, level, seedArr){
  const p = genParams(kind, level, seedArr);
  let front, answer, hints, explain;
  switch(kind){
    case 'mult': {
      const {a,b}=p; answer=a*b; const half=Math.floor(b/2), rem=b-half;
      front = `${a} × ${b}`;
      hints = [
        `Try splitting ${b} into two easier chunks, like ${half} and ${rem}.`,
        `${a} × ${half} = ${a*half}. Now figure out ${a} × ${rem}.`,
        `${a} × ${rem} = ${a*rem}. Add that to ${a*half} — what do you get?`
      ];
      explain = `Think of ${a} × ${b} as ${a} added to itself ${b} times — but there's a faster way. Split ${b} into ${half} + ${rem}:<br>• ${a} × ${half} = ${a*half}<br>• ${a} × ${rem} = ${a*rem}<br>• Add the two results: ${a*half} + ${a*rem} = <b>${answer}</b>`;
      break;
    }
    case 'div': {
      const {divisor,quotient}=p; const product=divisor*quotient; answer=quotient;
      front = `${product} ÷ ${divisor}`;
      const half = Math.floor(quotient/2);
      hints = [
        `Ask yourself: "${divisor} times what equals ${product}?"`,
        `Try ${divisor} × ${half} = ${divisor*half}. How much more do you need to reach ${product}?`,
        `${divisor} × ${quotient-1} = ${divisor*(quotient-1)}. Is the answer just one more than that?`
      ];
      explain = `Division is asking "${divisor} times what equals ${product}?" The multiplication fact hiding inside is ${divisor} × ${quotient} = ${product}. So ${product} ÷ ${divisor} = <b>${quotient}</b>.`;
      break;
    }
    case 'frac': {
      const {num,den}=p; const raw = num/den*100; answer = Math.round(raw*10)/10;
      front = `${num}/${den} as a percent? (number only, e.g. 25)`;
      hints = [
        `First turn the fraction into a decimal: ${num} ÷ ${den} = ?`,
        `${num} ÷ ${den} ≈ ${(num/den).toFixed(2)}. Now shift that decimal point two places right.`,
        `${(num/den).toFixed(2)} moved two spots right becomes ${answer}%.`
      ];
      explain = `A percent just means "out of 100." Divide ${num} by ${den} to get a decimal: ${num} ÷ ${den} = ${(num/den).toFixed(2)}. Slide the decimal point two places right to turn it into a percent: <b>${answer}%</b>.`;
      break;
    }
    case 'neg_mul': {
      const {a,b}=p; answer=a*b;
      front = `${fmtSigned(a)} × ${fmtSigned(b)}`;
      const sameSign = (a<0)===(b<0);
      hints = [
        `Same signs multiply to a positive answer. Different signs multiply to a negative answer. What signs do you have here?`,
        `Multiply the numbers like normal, ignoring the signs for a second: ${Math.abs(a)} × ${Math.abs(b)} = ${Math.abs(a*b)}.`,
        `Now apply the sign rule to ${Math.abs(a*b)} — since the signs are ${sameSign? 'the same':'different'}, the answer is ${sameSign? 'positive':'negative'}.`
      ];
      explain = `Same signs → positive answer. Different signs → negative answer. Here the signs are ${sameSign?'the same':'different'}. Multiply ignoring signs: ${Math.abs(a)} × ${Math.abs(b)} = ${Math.abs(a*b)}. Apply the rule → <b>${answer}</b>.`;
      break;
    }
    case 'neg_add': {
      const {a,b}=p; answer=a+b;
      front = `${fmtSigned(a)} + ${fmtSigned(b)}`;
      hints = [
        `Picture a number line. Start at ${a} and move ${b>0?'right':'left'} by ${Math.abs(b)}.`,
        `Adding a negative is the same as subtracting: ${a} + (${b}) is the same as ${a} ${b<0?'−':'+'} ${Math.abs(b)}.`,
        `${a} ${b<0?'−':'+'} ${Math.abs(b)} = ?`
      ];
      explain = `On a number line, start at ${a} and move ${Math.abs(b)} steps ${b>=0?'right (positive)':'left (negative)'}. That lands you on <b>${answer}</b>.`;
      break;
    }
    case 'onestep_add': {
      const {n,total}=p; answer = total-n;
      front = `x + ${n} = ${total}`;
      hints = [
        `Whatever is added to x, undo it with the opposite operation.`,
        `The opposite of "+ ${n}" is "− ${n}." Try ${total} − ${n}.`,
        `${total} − ${n} = ? That's your value for x.`
      ];
      explain = `To solve x + ${n} = ${total}, undo the "+ ${n}" by subtracting ${n} from both sides: ${total} − ${n} = <b>${answer}</b>. So x = ${answer}.`;
      break;
    }
    case 'onestep_sub': {
      const {n,total}=p; answer = total+n;
      front = `x − ${n} = ${total}`;
      hints = [
        `Whatever is subtracted from x, undo it with the opposite operation.`,
        `The opposite of "− ${n}" is "+ ${n}." Try ${total} + ${n}.`,
        `${total} + ${n} = ? That's your value for x.`
      ];
      explain = `To solve x − ${n} = ${total}, undo the "− ${n}" by adding ${n} to both sides: ${total} + ${n} = <b>${answer}</b>. So x = ${answer}.`;
      break;
    }
    case 'onestep_mul': {
      const {coef,total}=p; answer = total/coef;
      front = `${coef}x = ${total}`;
      hints = [
        `x is being multiplied by ${coef}. Undo multiplication with the opposite operation — division.`,
        `Try dividing both sides by ${coef}: ${total} ÷ ${coef}.`,
        `${total} ÷ ${coef} = ? That's your value for x.`
      ];
      explain = `${coef}x = ${total} means "${coef} groups of x equal ${total}." Undo the multiplication by dividing both sides by ${coef}: ${total} ÷ ${coef} = <b>${answer}</b>.`;
      break;
    }
    case 'onestep_div': {
      const {coef,total}=p; answer = total*coef;
      front = `x ÷ ${coef} = ${total}`;
      hints = [
        `x is being divided by ${coef}. Undo division with the opposite operation — multiplication.`,
        `Try multiplying both sides by ${coef}: ${total} × ${coef}.`,
        `${total} × ${coef} = ? That's your value for x.`
      ];
      explain = `x ÷ ${coef} = ${total} means "x split into ${coef} equal groups gives ${total} each." Undo the division by multiplying both sides by ${coef}: ${total} × ${coef} = <b>${answer}</b>.`;
      break;
    }
    case 'percentof': {
      const {pct,N}=p; answer = Math.round((pct/100*N)*100)/100;
      front = `${pct}% of ${N}`;
      hints = [
        `Turn the percent into a decimal first: ${pct}% = ${pct/100}.`,
        `Now multiply: ${pct/100} × ${N}.`,
        `${pct/100} × ${N} = ? That's your answer.`
      ];
      explain = `To find ${pct}% of ${N}, change the percent to a decimal (${pct}% = ${pct/100}) and multiply: ${pct/100} × ${N} = <b>${answer}</b>.`;
      break;
    }
  }
  return { kind, level, params:p, front, answer, hints, explain };
}

function checkAnswer(card, raw){
  if(raw===null || raw===undefined || raw.trim()==="") return false;
  const cleaned = raw.replace(/%/g,'').trim();
  const num = parseFloat(cleaned);
  if(isNaN(num)) return false;
  return Math.abs(num - parseFloat(card.answer)) < 0.06;
}

/* ================= STATE + STORAGE ================= */

let progress = { completedDays:{}, quizScores:{}, cardLevels:{} };
let currentView = "dash";
let storageReady = false;

async function loadProgress(){
  try{
    const r = await window.storage.get('shiah-math-progress', false);
    if(r && r.value){ const parsed = JSON.parse(r.value); progress = Object.assign({completedDays:{},quizScores:{},cardLevels:{}}, parsed); }
  }catch(e){ /* no saved progress yet */ }
  storageReady = true;
  render();
}
async function saveProgress(){
  try{ await window.storage.set('shiah-math-progress', JSON.stringify(progress), false); }
  catch(e){ console.error('save failed', e); }
}

function skillStats(){
  const stats = {}; Object.keys(SUBJECTS).forEach(k=>stats[k]={correct:0,total:0});
  DAYS.forEach(d=>{ const sc=progress.quizScores[d.id]; if(sc){ stats[d.subject].correct+=sc.score; stats[d.subject].total+=sc.total; } });
  return stats;
}
function overallPct(){ return Math.round((Object.keys(progress.completedDays).length/14)*100); }
function streakCount(){ let s=0; for(let i=1;i<=14;i++){ if(progress.completedDays[i]) s++; else break; } return s; }

/* ================= RENDER: DASHBOARD ================= */

function renderWheel(pct,size){
  const r=size/2-10; const c=2*Math.PI*r; const off=c-(pct/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--ring-track)" stroke-width="12" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--lilac)" stroke-width="12" fill="none"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}

function renderDashboard(){
  const stats=skillStats(); const pct=overallPct(); const streak=streakCount(); const done=Object.keys(progress.completedDays).length;
  const skillBars = Object.keys(SUBJECTS).map(k=>{
    const s=stats[k]; const p=s.total?Math.round((s.correct/s.total)*100):0;
    return `<div class="skill-row"><div class="skill-name"><span>${SUBJECTS[k].name}</span><span class="mono">${p}%</span></div>
    <div class="skill-track"><div class="skill-fill" style="width:${p}%;background:${SUBJECTS[k].solid}"></div></div></div>`;
  }).join("");

  return `
  <div class="hero">
    ${heroDeco()}
    <div class="wheel-box">
      ${renderWheel(pct,150)}
      <div class="wheel-center"><div class="bloom">🌸</div><div class="num">${pct}%</div><div class="lbl">Reset<br>Complete</div></div>
    </div>
    <div class="hero-text">
      <div class="eyebrow">14-Day Freshman Math Reset</div>
      <h1>Hey Shiah — let's get Pinnacle-ready</h1>
      <p>20–30 focused minutes a day on multiplication, division, fractions/percents, and basic algebra — the exact skills Algebra 1 builds on. Flashcards get harder the better you do, and give you gentle hints if you get stuck.</p>
      <div class="streak-pill">🌷 ${streak}-day streak &nbsp;•&nbsp; ${done}/14 days done</div>
    </div>
  </div>

  <div class="card"><h2>${flowerBullet('frac')} Skill Mastery</h2>${skillBars}</div>

  <div class="card"><h2>${flowerBullet('alg')} Daily Success Formula</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">10m</div><div class="stat-lbl">Flashcards</div></div>
      <div class="stat-card"><div class="stat-num">10m</div><div class="stat-lbl">New Lesson</div></div>
      <div class="stat-card"><div class="stat-num">10m</div><div class="stat-lbl">Practice</div></div>
    </div>
  </div>

  <div class="card"><h2>${flowerBullet('mult')} Quick Drill</h2>
    <p style="color:var(--muted);font-size:14px;margin:6px 0 12px;">Feeling ready? Jump into a random 60-second mixed-facts drill — no need to wait for the right day.</p>
    <button class="btn" onclick="startQuickDrill()">Start Quick Drill</button>
  </div>
  <div id="drillArea"></div>
  `;
}

/* ================= RENDER: DAY VIEW ================= */

let flashRT = null;
let quizState = {};

function renderDay(day){
  const sub=SUBJECTS[day.subject]; const isDone=!!progress.completedDays[day.id];
  const idx=DAYS.findIndex(d=>d.id===day.id);
  const prevDay = idx>0?DAYS[idx-1]:null; const nextDay = idx<DAYS.length-1?DAYS[idx+1]:null;

  if(!flashRT || flashRT.dayId!==day.id){
    const kind = day.flashKinds[0];
    const level = progress.cardLevels[day.id+':'+kind] || 1;
    flashRT = { dayId:day.id, kindIdx:0, kind, level, card:buildCard(kind, level, day.flashSeeds[kind]), attempts:0, phase:'active', compCard:null, compGiven:null };
  }
  quizState = quizState.dayId===day.id ? quizState : {dayId:day.id, answered:{}, correctCount:0};

  const videoBtns = day.videos.map(v=>`<a class="video-btn" href="${v.u}" target="_blank" rel="noopener"><span class="play">▶</span>${v.t}</a>`).join("");

  return `
  <div class="card">
    <span class="day-tag" style="background:${sub.soft};color:${sub.solid}">Day ${day.id} · ${sub.name}</span>
    <h2>${day.title}</h2>

    <div class="section-label">${flowerBullet(day.subject)} Learn</div>
    <ul class="lesson-list">${day.lesson.map(l=>`<li>${l}</li>`).join("")}</ul>
    <div class="goal-box"><b>Goal:</b> ${day.goal}</div>

    <div class="section-label">${flowerBullet(day.subject)} Watch</div>
    <div class="video-row">${videoBtns}</div>

    <div class="section-label">${flowerBullet(day.subject)} Adaptive Flashcards</div>
    <div id="flashHost"></div>

    ${day.timed ? `<div class="section-label">⏱ Timed Drill</div><div id="timedDrillHost"></div>` : ``}

    <div class="section-label">✅ Quiz — instant feedback</div>
    <div id="quizHost"></div>

    <div class="complete-row">
      <div class="day-nav-btns">
        ${prevDay ? `<button class="btn secondary" onclick="goToDay(${prevDay.id})">← Day ${prevDay.id}</button>` : `<button class="btn secondary" onclick="goDash()">← Dashboard</button>`}
        ${nextDay ? `<button class="btn secondary" onclick="goToDay(${nextDay.id})">Day ${nextDay.id} →</button>` : ``}
      </div>
      <button class="complete-btn ${isDone?'done':''}" onclick="toggleComplete(${day.id})">${isDone?'✓ Day Complete':'Mark Day Complete'}</button>
    </div>
  </div>`;
}

/* ---- Flashcard runtime rendering ---- */

function renderFlashcards(){
  const host = document.getElementById('flashHost');
  if(!host) return;
  const st = flashRT; const card = st.card;
  const dots = Array.from({length:4}).map((_,i)=>`<div class="attempt-dot ${i<st.attempts?'used':''}"></div>`).join("");

  let inner = `
    <div class="flash-panel">
      <div class="flash-meta">
        <span class="lvl">${KIND_LABEL[st.kind]} · Level ${st.level}</span>
        <div class="attempt-dots">${dots}</div>
      </div>
      <div class="flash-front">${card.front}<small>Type your answer below</small></div>
  `;

  if(st.phase==='active'){
    inner += `
      <div class="flash-input-row">
        <input class="flash-input" id="flashInput" type="text" inputmode="decimal" autocomplete="off" />
        <button class="btn" onclick="submitFlash()">Check</button>
      </div>
      <div id="flashHintArea"></div>
    `;
  } else if(st.phase==='success'){
    inner += `<div class="success-box">🎉 Nice! ${card.answer} is correct. Ready for something a little tougher?</div>
      <button class="btn" style="margin-top:10px" onclick="advanceFlash(true)">Next Challenge →</button>`;
  } else if(st.phase==='locked'){
    inner += `<div class="explain-box">${card.explain}</div>`;
    inner += renderComprehensionBlock();
  }

  inner += `</div>`;
  host.innerHTML = inner;

  if(st.phase==='active'){
    const inp = document.getElementById('flashInput');
    if(inp){ inp.focus(); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submitFlash(); }); }
    // repaint hints if any already shown this round
    if(st.attempts>0 && st.attempts<4){
      document.getElementById('flashHintArea').innerHTML = `<div class="hint-box">💡 ${card.hints[st.attempts-1]}</div>`;
    }
  }
}

function renderComprehensionBlock(){
  const st = flashRT;
  if(!st.compCard){
    st.compCard = buildCard(st.kind, Math.max(1, st.level-1), currentDayObj().flashSeeds[st.kind]);
    st.compGiven = null;
  }
  const cc = st.compCard;
  let block = `<div class="comp-box"><span class="tag">Quick check — let's make sure it clicked</span>
    <div class="flash-front" style="font-size:19px;padding:14px;">${cc.front}</div>`;
  if(st.compGiven===null){
    block += `
      <div class="flash-input-row">
        <input class="flash-input" id="compInput" type="text" inputmode="decimal" autocomplete="off" />
        <button class="btn" onclick="submitComprehension()">Check</button>
      </div>`;
  } else {
    const correct = checkAnswer(cc, st.compGiven);
    block += `<div class="${correct?'success-box':'hint-box'}">
      ${correct ? "✅ Yes! You've got it." : "✗ Not quite — that's okay."} The answer is <b>${cc.answer}</b>.
    </div>
    <button class="btn secondary" style="margin-top:10px" onclick="advanceFlash(false)">Skip → Next Card</button>`;
  }
  block += `</div>`;
  return block;
}

function submitFlash(){
  const st = flashRT; const inp = document.getElementById('flashInput');
  const val = inp.value;
  const correct = checkAnswer(st.card, val);
  if(correct){
    st.level = Math.min(MAX_LEVEL, st.level+1);
    progress.cardLevels[st.dayId+':'+st.kind] = st.level;
    saveProgress();
    st.phase = 'success';
  } else {
    st.attempts++;
    if(st.attempts>=4){
      st.level = Math.max(1, st.level-1);
      progress.cardLevels[st.dayId+':'+st.kind] = st.level;
      saveProgress();
      st.phase = 'locked';
      st.compCard = null; st.compGiven = null;
    }
  }
  renderFlashcards();
}
function submitComprehension(){
  const inp = document.getElementById('compInput');
  flashRT.compGiven = inp.value;
  renderFlashcards();
}
function advanceFlash(escalate){
  const st = flashRT; const day = currentDayObj();
  st.kindIdx = (st.kindIdx+1) % day.flashKinds.length;
  st.kind = day.flashKinds[st.kindIdx];
  st.level = progress.cardLevels[day.id+':'+st.kind] || 1;
  st.card = buildCard(st.kind, st.level, day.flashSeeds[st.kind]);
  st.attempts = 0; st.phase = 'active'; st.compCard = null; st.compGiven = null;
  renderFlashcards();
}

/* ---- Quiz ---- */

function renderQuiz(day){
  const st = quizState;
  const blocks = day.quiz.map((q,i)=>{
    const ans = st.answered[i];
    const opts = q.opts.map(o=>{
      let cls='opt-btn';
      if(ans){ cls+=' disabled'; if(o===q.a) cls+=' correct'; else if(o===ans && ans!==q.a) cls+=' wrong'; }
      return `<button class="${cls}" onclick="answerQuiz(${i}, '${o.replace(/'/g,"\\'")}')">${o}</button>`;
    }).join("");
    return `<div class="q-block"><div class="q-text">${i+1}. ${q.q}</div><div class="opt-row">${opts}</div></div>`;
  }).join("");
  const answeredCount = Object.keys(st.answered).length; const total = day.quiz.length;
  let scoreHtml="";
  if(answeredCount===total){
    const pct = Math.round((st.correctCount/total)*100); const good = pct>=80;
    scoreHtml = `<div class="quiz-score" style="background:${good?'var(--success-soft)':'var(--danger-soft)'};color:${good?'#2E5C36':'#7A2E2C'}">
      Score: ${st.correctCount}/${total} (${pct}%) ${good?'— nice work! 🎉':'— review the flashcards above and try again tomorrow.'}
    </div><button class="btn secondary" style="margin-top:10px" onclick="retryQuiz()">Retry Quiz</button>`;
  }
  document.getElementById('quizHost').innerHTML = blocks + scoreHtml;
}
function answerQuiz(i,val){
  const day = currentDayObj();
  if(quizState.answered[i]) return;
  quizState.answered[i]=val;
  if(val===day.quiz[i].a) quizState.correctCount++;
  renderQuiz(day);
  if(Object.keys(quizState.answered).length===day.quiz.length){
    progress.quizScores[day.id]={score:quizState.correctCount, total:day.quiz.length};
    saveProgress();
    setTimeout(()=>render(),50);
  }
}
function retryQuiz(){ quizState={dayId:currentDayObj().id, answered:{}, correctCount:0}; renderQuiz(currentDayObj()); }

/* ---- Timed drill (unchanged logic) ---- */

let drillTimer=null, drillState=null;
function buildDrillPool(mode){
  const facts=[];
  for(let a=2;a<=9;a++){ for(let b=2;b<=9;b++){ facts.push({q:`${a} × ${b}`, a:a*b}); if(mode==="mixed") facts.push({q:`${a*b} ÷ ${a}`, a:b}); } }
  return facts;
}
function startDrill(mode,seconds){
  const pool=buildDrillPool(mode);
  drillState={pool,seconds,timeLeft:seconds,correct:0,wrong:0,current:null,running:true};
  nextDrillQ(); renderDrillUI();
  drillTimer=setInterval(()=>{ drillState.timeLeft--; if(drillState.timeLeft<=0) endDrill(); else updateDrillTimerDisplay(); },1000);
}
function nextDrillQ(){ const p=drillState.pool; drillState.current=p[Math.floor(Math.random()*p.length)]; }
function renderDrillUI(){
  const host=document.getElementById('timedDrillHost');
  if(!host) return;
  host.innerHTML = `
    <div class="card" style="background:var(--bg-card-2)">
      <div class="timer-bar">
        <div class="timer-display mono" id="timerDisp">${drillState.timeLeft}s</div>
        <div class="mono">✅ ${drillState.correct} &nbsp; ❌ ${drillState.wrong}</div>
        <button class="btn secondary" onclick="endDrill()">Stop</button>
      </div>
      <div class="drill-q">${drillState.current.q} = ?</div>
      <input class="drill-input" id="drillInput" type="number" autofocus />
      <div class="drill-feedback" id="drillFeedback"></div>
    </div>`;
  const inp=document.getElementById('drillInput'); inp.focus();
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') checkDrillAnswer(); });
}
function checkDrillAnswer(){
  if(!drillState||!drillState.running) return;
  const inp=document.getElementById('drillInput'); const val=parseFloat(inp.value); const fb=document.getElementById('drillFeedback');
  if(val===drillState.current.a){ drillState.correct++; fb.textContent="✓ Correct!"; fb.style.color="var(--success)"; }
  else{ drillState.wrong++; fb.textContent=`✗ Answer: ${drillState.current.a}`; fb.style.color="var(--danger)"; }
  nextDrillQ(); renderDrillUI();
}
function updateDrillTimerDisplay(){ const el=document.getElementById('timerDisp'); if(el) el.textContent=drillState.timeLeft+"s"; }
function endDrill(){
  clearInterval(drillTimer); if(!drillState) return; drillState.running=false;
  const total=drillState.correct+drillState.wrong; const pct=total?Math.round((drillState.correct/total)*100):0;
  const host=document.getElementById('timedDrillHost');
  host.innerHTML = `
    <div class="card" style="background:var(--bg-card-2);text-align:center">
      <h2>Drill Complete</h2>
      <div class="quiz-score" style="background:${pct>=80?'var(--success-soft)':'var(--danger-soft)'};color:${pct>=80?'#2E5C36':'#7A2E2C'}">
        ${drillState.correct} correct / ${drillState.wrong} wrong — ${pct}% accuracy
      </div>
      <button class="btn" style="margin-top:14px" onclick="startDrill('${drillState.pool.length>81?'mixed':'mult'}', ${drillState.seconds})">Run Again</button>
    </div>`;
}
function startTimedDrillForDay(day){
  const mode = day.drillFact==="mixed" ? "mixed":"mult";
  document.getElementById('timedDrillHost').innerHTML = `
    <div class="card" style="background:var(--bg-card-2);text-align:center">
      <p style="color:var(--muted);margin-top:0">60-second mixed facts sprint. Type the answer and hit Enter.</p>
      <button class="btn" onclick="startDrill('${mode}',60)">Start 60-Second Drill</button>
    </div>`;
}
function startQuickDrill(){
  const area=document.getElementById('drillArea');
  const fakeHost=document.createElement('div'); fakeHost.id='timedDrillHost';
  area.innerHTML=''; area.appendChild(fakeHost);
  startDrill('mixed',60);
}

/* ================= NAV / ROUTER ================= */

function currentDayObj(){ return DAYS.find(d=>d.id===currentView); }
function goToDay(id){ currentView=id; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function goDash(){ currentView="dash"; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleComplete(id){ if(progress.completedDays[id]) delete progress.completedDays[id]; else progress.completedDays[id]=true; saveProgress(); render(); }

function renderNav(){
  const chips=[`<div class="chip ${currentView==='dash'?'active':''}" onclick="goDash()">🌸 Dashboard</div>`]
    .concat(DAYS.map(d=>{ const done=progress.completedDays[d.id]; return `<div class="chip ${currentView===d.id?'active':''}" onclick="goToDay(${d.id})">${flowerBullet(d.subject)} Day ${d.id} ${done?'<span class="check">✓</span>':''}</div>`; }));
  return `<div class="nav-row">${chips.join("")}</div><div class="floral-rule"></div>`;
}

function render(){
  if(!storageReady){ document.getElementById('app').innerHTML = `<div style="padding:60px;text-align:center;color:var(--muted)">Loading your progress...</div>`; return; }
  const app=document.getElementById('app');
  let body;
  if(currentView==="dash"){ body=renderDashboard(); }
  else { body=renderDay(currentDayObj()); }
  app.innerHTML = renderNav() + body;

  if(currentView!=="dash"){
    const day=currentDayObj();
    renderFlashcards();
    renderQuiz(day);
    if(day.timed) startTimedDrillForDay(day);
  }
  app.innerHTML += `<div class="footer-note">Built for Shiah · Pinnacle High School freshman prep · Progress saves automatically as you go.</div>`;
}

loadProgress();
</script>
